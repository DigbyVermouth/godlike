<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cryptogram Puzzle</title>

<style>
  :root {
    --ink: #0d0900;
    --paper: #fdf6e3;
    --aged: #f0e6c8;
    --sepia: #7a5c2e;
    --rust: #7a2800;
    --forest: #1a3d1a;
    --correct: #1a5c1a;
    --wrong: #7a1200;
    --highlight: #f5c800;
    --highlight-dim: rgba(245,200,0,0.30);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--aged);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(139,90,43,0.08) 28px),
      url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    min-height: 100vh;
    font-family: Consolas, 'Courier New', monospace;
    color: var(--ink);
    padding: 16px;
    padding-bottom: 60px;
  }
  .masthead {
    text-align: center;
    border-top: 3px double var(--ink);
    border-bottom: 3px double var(--ink);
    padding: 10px 0;
    margin-bottom: 14px;
    position: relative;
  }
  .masthead h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(24px, 7vw, 40px);
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
  }
  .masthead .subtitle { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: #3a2400; font-weight: 700; margin-top: 4px; }
  .corner-deco { position: absolute; font-size: 18px; color: #3a2400; top: 8px; }
  .corner-deco.left { left: 8px; }
  .corner-deco.right { right: 8px; }

  /* CATEGORY STRIP */
  .cat-strip-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 12px; padding-bottom: 4px; scrollbar-width: none; }
  .cat-strip-wrap::-webkit-scrollbar { display: none; }
  .cat-strip { display: flex; gap: 6px; width: max-content; padding: 2px 1px; }
  .cat-btn {
    padding: 6px 13px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    font-family: Consolas, 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
    color: #0d0900;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-btn.active { background: var(--ink); color: var(--paper); }
  .cat-btn:not(.active):hover { background: var(--highlight); }

  /* CONTROLS */
  .controls { display: flex; gap: 8px; margin-bottom: 12px; }
  .btn {
    flex: 1;
    padding: 14px 8px;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: 2px solid var(--ink);
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    top: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: var(--rust); border-color: var(--rust); top: -1px; box-shadow: 2px 2px 0 var(--ink); }
  .btn-secondary { background: var(--paper); color: var(--ink); }
  .btn-secondary:hover { background: var(--highlight); top: -1px; box-shadow: 2px 2px 0 var(--ink); }
  .btn:disabled { opacity: 0.38; cursor: not-allowed; top: 0 !important; box-shadow: none !important; }

  /* STATS */
  .stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat-box { flex: 1; background: var(--paper); border: 1.5px solid var(--ink); padding: 7px 4px; text-align: center; }
  .stat-num { font-family: Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 900; line-height: 1; }
  .stat-lbl { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #3a2400; font-weight: 700; margin-top: 2px; }

  /* WIN BANNER */
  .win-banner { background: var(--forest); color: var(--paper); text-align: center; padding: 14px; margin-bottom: 12px; border: 2px solid var(--ink); animation: fadeSlide 0.5s ease; }
  .win-banner h2 { font-family: Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
  .win-banner p { font-size: 11px; letter-spacing: 0.15em; margin-top: 5px; opacity: 0.85; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* PUZZLE CARD */
  .puzzle-card { background: var(--paper); border: 2px solid var(--ink); padding: 20px 16px; margin-bottom: 14px; box-shadow: 4px 4px 0 var(--sepia); min-height: 110px; position: relative; }
  .puzzle-card::before { content: ''; position: absolute; inset: 5px; border: 1px solid rgba(139,90,43,0.18); pointer-events: none; }
  .status-bar { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #3a2400; font-weight: 700; margin-bottom: 8px; border-bottom: 2px solid #3a2400; padding-bottom: 7px; }
  .loading-msg { text-align: center; font-family: Georgia, 'Times New Roman', serif; font-size: 15px; color: var(--sepia); padding: 28px 0; letter-spacing: 0.05em; }

  /* SAME-LETTER TIP */
  .same-letter-tip { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: #7a2800; font-weight: 700; margin-bottom: 10px; text-align: center; min-height: 18px; }

  /* CIPHER DISPLAY */
  .cipher-display { display: flex; flex-wrap: wrap; gap: 8px 5px; align-items: flex-end; }
  .word-group { display: flex; gap: 4px; margin-bottom: 10px; }
  .letter-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .cipher-char {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(20px, 5.5vw, 28px);
    font-weight: 700;
    color: var(--rust);
    line-height: 1;
    width: 28px;
    text-align: center;
    border-radius: 2px;
    transition: background 0.12s;
  }
  .cipher-char.same-selected { color: var(--ink); background: var(--highlight); }
  .letter-input {
    width: 28px;
    height: 32px;
    border: none;
    border-bottom: 2px solid var(--ink);
    background: transparent;
    text-align: center;
    font-family: Consolas, 'Courier New', monospace;
    font-size: clamp(16px, 4.5vw, 22px);
    font-weight: 700;
    color: var(--ink);
    outline: none;
    text-transform: uppercase;
    padding: 0;
    caret-color: transparent;
    transition: background 0.12s, border-color 0.12s;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    user-select: none;
  }
  .letter-input.same-cipher { background: var(--highlight-dim); border-bottom-color: var(--sepia); }
  .letter-input.selected { background: rgba(240,192,64,0.55); border-bottom-color: var(--rust); }
  .letter-input.correct { color: var(--correct); border-bottom-color: var(--correct); }
  .letter-input.wrong { color: var(--wrong); border-bottom-color: var(--wrong); animation: shake 0.28s ease; }
  .letter-input.revealed { color: var(--sepia); font-style: italic; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
  .space-char { width: 14px; }
  .punct-char { font-family: Georgia, 'Times New Roman', serif; font-size: clamp(20px, 5.5vw, 28px); color: var(--ink); line-height: 1; align-self: flex-end; margin-bottom: 2px; }
  .attribution { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 13px; color: #3a2400; font-weight: 700; text-align: right; margin-top: 10px; padding-top: 8px; border-top: 2px solid #3a2400; }

  /* KEYBOARD */
  .keyboard-section { background: #ddd0b0; border: 2px solid #0d0900; padding: 12px 8px 10px; box-shadow: 4px 4px 0 #4a3010; margin-bottom: 14px; }
  .key-label { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: #2a1800; font-weight: 700; margin-bottom: 10px; text-align: center; }
  .keyboard-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 6px; }
  .key {
    width: clamp(30px, 9vw, 52px);
    height: clamp(48px, 13vw, 62px);
    border: 2px solid #0d0900;
    background: #ffffff;
    color: #0d0900;
    font-family: Consolas, 'Courier New', monospace;
    font-size: clamp(16px, 4.5vw, 22px);
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    position: relative;
    top: 0;
    box-shadow: 0 3px 0 #0d0900;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .key:active { background: #0d0900; color: #ffffff; top: 3px; box-shadow: none; }
  .key.used { background: #888888; color: #ffffff; box-shadow: 0 2px 0 #333333; }
  .key.backspace { width: clamp(52px, 15vw, 76px); font-size: 20px; }
  .freq-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; padding-top: 8px; border-top: 1.5px dashed #5a3c10; justify-content: center; }
  .freq-item { font-size: 11px; color: #3a2000; font-weight: 700; letter-spacing: 0.05em; }
  .freq-item.sel { color: #7a2800; font-weight: 900; text-decoration: underline; }
</style>
</head>
<body>

<div class="masthead">
  <span class="corner-deco left">✦</span>
  <h1>Cryptogram</h1>
  <div class="subtitle">Daily Cipher Puzzle</div>
  <span class="corner-deco right">✦</span>
</div>

<div class="cat-strip-wrap"><div class="cat-strip" id="catStrip"></div></div>

<div class="controls">

  <button class="btn btn-secondary" id="btnHint" onclick="giveHint()" disabled>💡 Hint</button>
  <button class="btn btn-secondary" id="btnReveal" onclick="revealAll()" disabled>👁 Reveal</button>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="stat-num" id="statSolved">0</div><div class="stat-lbl">Solved</div></div>
  <div class="stat-box"><div class="stat-num" id="statHints">0</div><div class="stat-lbl">Hints</div></div>
  <div class="stat-box"><div class="stat-num" id="statTime">0:00</div><div class="stat-lbl">Time</div></div>
  <div class="stat-box"><div class="stat-num" id="statPct">0%</div><div class="stat-lbl">Done</div></div>
</div>

<div id="winBanner" style="display:none" class="win-banner">
  <h2>🎉 Puzzle Solved!</h2>
  <p id="winMsg"></p>
</div>

<div class="puzzle-card">
  <div class="status-bar">
    <span id="statusLeft">Choose a category &amp; press New Puzzle</span>
    <span id="statusRight"></span>
  </div>
  <div class="same-letter-tip" id="sameLetterTip"></div>
  <div id="puzzleArea" class="loading-msg">Press "New Puzzle" to begin</div>
  <div class="attribution" id="attribution" style="display:none"></div>
</div>

<div class="keyboard-section" id="keyboardSection" style="display:none">
  <div class="key-label" id="keyLabel">Tap a cipher letter above, then tap a key below</div>
  <div id="keyboard"></div>
  <div class="freq-row" id="freqGrid"></div>
</div>

const USED_INDICES = {};

const KB_ROWS = [['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M','⌫']];

/* ── FETCH QUOTE ── */
/* Strategy:
   1. Try quotable.io public API - real random quotes by tag, totally free
   2. If offline/unavailable, draw randomly from the built-in QUOTE_BANK
      using USED_INDICES to avoid repeating within the session
*/
async function fetchNewQuote() {
  clearTimer();
  document.getElementById('winBanner').style.display = 'none';
  document.getElementById('btnHint').disabled = true;
  document.getElementById('btnReveal').disabled = true;
  document.getElementById('keyboardSection').style.display = 'none';
  document.getElementById('attribution').style.display = 'none';
  document.getElementById('sameLetterTip').textContent = '';
  document.getElementById('puzzleArea').innerHTML = '<div class="loading-msg">Fetching quote...</div>';
  document.getElementById('statusLeft').textContent = 'Loading...';
  document.getElementById('statusRight').textContent = '';

  const cat = CATEGORIES.find(c => c.id === S.activeCategory);

  // Try quotable.io first - fetch quotes and pick a random one from the page
  try {
    const skip = Math.floor(Math.random() * 80);
    const url = 'https://api.quotable.io/quotes?tags=' + cat.apiTags + '&limit=50&skip=' + skip + '&minLength=40&maxLength=140';
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const results = data.results || [];
    if (results.length === 0) throw new Error('No results');

    // Pick a random quote from the returned page
    const pick = results[Math.floor(Math.random() * results.length)];
    let q = pick.content.toUpperCase()
      .replace(/[\u2018\u2019']/g, '')
      .replace(/[\u201C\u201D]/g, '')
      .replace(/[^A-Z0-9 .,!?]/g, '')
      .trim();
    buildPuzzle(q, pick.author);
    return;
  } catch(e) {
    // Fall through to built-in bank
  }

  // Built-in bank fallback - pick randomly, no repeats until bank exhausted
  const bank = QUOTE_BANK[S.activeCategory] || QUOTE_BANK.philosophical;
  if (!USED_INDICES[S.activeCategory]) USED_INDICES[S.activeCategory] = [];
  let used = USED_INDICES[S.activeCategory];

  // Reset if all used
  if (used.length >= bank.length) USED_INDICES[S.activeCategory] = used = [];

  // Pick a random unused index
  const available = bank.map(function(_,i){ return i; }).filter(function(i){ return !used.includes(i); });
  const idx = available[Math.floor(Math.random() * available.length)];
  used.push(idx);

  const fb = bank[idx];
  buildPuzzle(fb.q, fb.author);
}

/* ── BUILD PUZZLE ── */
function buildPuzzle(plainText, author) {
  S.plainText = plainText; S.author = author;
  S.guesses = {}; S.solved = false; S.hintsUsed = 0;
  S.selectedCipher = null; S.revealedLetters = new Set();
  document.getElementById('statHints').textContent = '0';
  document.getElementById('statPct').textContent = '0%';

  const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  let shuffled;
  do {
    shuffled = [...alpha];
    for (let i = shuffled.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [shuffled[i],shuffled[j]] = [shuffled[j],shuffled[i]];
    }
  } while (alpha.some((l,i) => l===shuffled[i]));

  S.cipher={}; S.decipher={};
  alpha.forEach((l,i)=>{ S.cipher[l]=shuffled[i]; S.decipher[shuffled[i]]=l; });

  S.tokens = [];
  for (const ch of plainText) {
    if (/[A-Z]/.test(ch)) S.tokens.push({type:'letter', plain:ch, cipher:S.cipher[ch]});
    else if (ch===' ')    S.tokens.push({type:'space'});
    else                  S.tokens.push({type:'punct', char:ch});
  }

  renderPuzzle(); renderKeyboard(); startTimer();
  document.getElementById('btnHint').disabled = false;
  document.getElementById('btnReveal').disabled = false;
  document.getElementById('btnReset').disabled = false;
  document.getElementById('keyboardSection').style.display = 'block';
  document.getElementById('attribution').style.display = 'block';
  document.getElementById('attribution').textContent = '— ' + author;
  document.getElementById('statusLeft').textContent = 'Tap any red cipher letter to select it';
  updateStatus();
}

/* ── RENDER PUZZLE ──
   Tapping any instance of a cipher letter selects the whole group.
   ALL boxes with that cipher letter highlight together.
   One key press fills every box sharing that cipher letter at once. */
function renderPuzzle() {
  const area = document.getElementById('puzzleArea');
  area.innerHTML = '';
  const display = document.createElement('div');
  display.className = 'cipher-display';
  let wordGroup = document.createElement('div');
  wordGroup.className = 'word-group';

  S.tokens.forEach((tok) => {
    if (tok.type==='space') {
      display.appendChild(wordGroup);
      const sp = document.createElement('div'); sp.className='space-char';
      display.appendChild(sp);
      wordGroup = document.createElement('div'); wordGroup.className='word-group';
      return;
    }
    if (tok.type==='punct') {
      const p = document.createElement('div'); p.className='punct-char'; p.textContent=tok.char;
      wordGroup.appendChild(p); return;
    }

    const isSame = S.selectedCipher !== null && tok.cipher === S.selectedCipher;
    const cell = document.createElement('div'); cell.className='letter-cell';

    const cDiv = document.createElement('div');
    cDiv.className = 'cipher-char' + (isSame ? ' same-selected' : '');
    cDiv.textContent = tok.cipher;

    const inp = document.createElement('input');
    inp.className = 'letter-input';
    inp.maxLength = 1; inp.readOnly = true;
    inp.autocomplete='off'; inp.autocorrect='off'; inp.autocapitalize='off'; inp.spellcheck=false;

    const guess = S.guesses[tok.cipher];
    if (S.revealedLetters.has(tok.cipher)) {
      inp.value = guess||''; inp.classList.add('revealed');
    } else if (guess) {
      inp.value = guess;
      inp.classList.add(guess===tok.plain ? 'correct' : 'wrong');
    }

    if (isSame) inp.classList.add('same-cipher');   // highlight all matching
    if (isSame) inp.classList.add('selected');       // (selected overrides in cascade — both applied for max visibility)

    inp.addEventListener('click', ()=>selectCipher(tok.cipher));
    inp.addEventListener('touchstart', e=>{ e.preventDefault(); selectCipher(tok.cipher); }, {passive:false});

    cell.appendChild(cDiv); cell.appendChild(inp);
    wordGroup.appendChild(cell);
  });

  display.appendChild(wordGroup);
  area.appendChild(display);
  updateTip();
}

function updateTip() {
  const tip = document.getElementById('sameLetterTip');
  if (!S.selectedCipher) { tip.textContent=''; return; }
  const count = S.tokens.filter(t=>t.type==='letter'&&t.cipher===S.selectedCipher).length;
  tip.textContent = count>1
    ? `✦ "${S.selectedCipher}" appears ${count} times — your guess fills all ${count} boxes at once`
    : `✦ "${S.selectedCipher}" appears once in this puzzle`;
}

/* ── SELECT + INPUT ── */
function selectCipher(cipher) {
  if (S.solved || S.revealedLetters.has(cipher)) return;
  S.selectedCipher = cipher;
  renderPuzzle(); renderKeyboard();
  document.getElementById('statusRight').textContent = `Selected: ${cipher}`;
  document.getElementById('keyLabel').textContent =
    `Guessing for cipher "${cipher}" — fills every "${cipher}" instantly`;
}

function typeGuess(letter) {
  if (!S.selectedCipher || S.solved || S.revealedLetters.has(S.selectedCipher)) return;
  S.guesses[S.selectedCipher] = letter;
  renderPuzzle(); renderKeyboard(); updateStatus(); checkWin();
  if (!S.solved) advanceSelection();
}

function deleteLast() {
  if (!S.selectedCipher || S.solved) return;
  delete S.guesses[S.selectedCipher];
  renderPuzzle(); renderKeyboard(); updateStatus();
}

function advanceSelection() {
  const next = [...new Set(
    S.tokens.filter(t=>t.type==='letter'&&!S.guesses[t.cipher]&&!S.revealedLetters.has(t.cipher)).map(t=>t.cipher)
  )];
  if (next.length>0) { S.selectedCipher=next[0]; renderPuzzle(); }
}

/* ── STATUS + WIN ── */
function updateStatus() {
  const ltoks = S.tokens.filter(t=>t.type==='letter');
  const uniq = [...new Set(ltoks.map(t=>t.cipher))];
  const filled = uniq.filter(c=>S.guesses[c]||S.revealedLetters.has(c)).length;
  document.getElementById('statusLeft').textContent = `${filled} / ${uniq.length} cipher letters filled`;
  document.getElementById('statPct').textContent = Math.round(filled/uniq.length*100)+'%';
}

function checkWin() {
  const allOk = S.tokens.filter(t=>t.type==='letter').every(t=>{
    return S.revealedLetters.has(t.cipher) || S.guesses[t.cipher]===t.plain;
  });
  if (allOk && !S.solved) {
    S.solved=true; S.totalSolved++;
    clearTimer();
    document.getElementById('statSolved').textContent = S.totalSolved;
    document.getElementById('statPct').textContent = '100%';
    document.getElementById('winBanner').style.display = 'block';
    document.getElementById('winMsg').textContent =
      `Completed in ${document.getElementById('statTime').textContent} · ${S.hintsUsed} hint${S.hintsUsed!==1?'s':''} used`;
    S.selectedCipher=null;
    document.getElementById('sameLetterTip').textContent='';
    renderPuzzle();
  }
}

/* ── RESET PUZZLE ── */
function resetPuzzle() {
  if (!S.tokens.length) return;
  S.guesses = {};
  S.revealedLetters = new Set();
  S.solved = false;
  S.hintsUsed = 0;
  S.selectedCipher = null;
  document.getElementById('statHints').textContent = '0';
  document.getElementById('statPct').textContent = '0%';
  document.getElementById('winBanner').style.display = 'none';
  document.getElementById('sameLetterTip').textContent = '';
  document.getElementById('statusRight').textContent = '';
  startTimer();
  renderPuzzle();
  renderKeyboard();
  updateStatus();
  document.getElementById('statusLeft').textContent = 'Tap any red cipher letter to select it';
}

/* ── HINT + REVEAL ── */
function giveHint() {
  if (S.solved) return;
  const cands = [...new Set(
    S.tokens.filter(t=>t.type==='letter'&&!S.revealedLetters.has(t.cipher)&&S.guesses[t.cipher]!==t.plain).map(t=>t.cipher)
  )];
  if (!cands.length) return;
  const pick = cands[Math.floor(Math.random()*cands.length)];
  S.revealedLetters.add(pick); S.guesses[pick]=S.decipher[pick]; S.hintsUsed++;
  document.getElementById('statHints').textContent = S.hintsUsed;
  S.selectedCipher=null;
  renderPuzzle(); renderKeyboard(); updateStatus(); checkWin();
}

function revealAll() {
  if (S.solved) return;
  [...new Set(S.tokens.filter(t=>t.type==='letter').map(t=>t.cipher))].forEach(c=>{
    S.revealedLetters.add(c); S.guesses[c]=S.decipher[c];
  });
  S.solved=true; clearTimer(); S.selectedCipher=null;
  document.getElementById('sameLetterTip').textContent='';
  renderPuzzle(); updateStatus();
}

/* ── KEYBOARD ── */
function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const used = new Set(Object.values(S.guesses));
  KB_ROWS.forEach(row=>{
    const rowDiv = document.createElement('div'); rowDiv.className='keyboard-row';
    row.forEach(k=>{
      const btn = document.createElement('button');
      const isBack = k==='⌫';
      btn.className='key'+(isBack?' backspace':used.has(k)?' used':'');
      btn.textContent=k;
      const h=()=>isBack?deleteLast():typeGuess(k);
      btn.addEventListener('click',h);
      btn.addEventListener('touchstart',e=>{e.preventDefault();h();},{passive:false});
      rowDiv.appendChild(btn);
    });
    kb.appendChild(rowDiv);
  });

  // Frequency analysis
  const cf={};
  S.tokens.filter(t=>t.type==='letter').forEach(t=>cf[t.cipher]=(cf[t.cipher]||0)+1);
  const sorted=Object.entries(cf).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const fg=document.getElementById('freqGrid');
  fg.innerHTML='<span style="font-size:9px;color:var(--sepia);letter-spacing:0.12em;text-transform:uppercase;width:100%;display:block;margin-bottom:3px">Cipher frequency:</span>';
  sorted.forEach(([c,n])=>{
    const d=document.createElement('span');
    d.className='freq-item'+(c===S.selectedCipher?' sel':'');
    d.textContent=`${c}:${n}`;
    fg.appendChild(d);
  });
}

/* ── TIMER ── */
function startTimer() {
  S.startTime=Date.now(); clearTimer();
  S.timerInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-S.startTime)/1000);
    document.getElementById('statTime').textContent=`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  },1000);
}
function clearTimer(){ if(S.timerInterval) clearInterval(S.timerInterval); }

/* ── PHYSICAL KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if (!S.selectedCipher||S.solved) return;
  const k=e.key.toUpperCase();
  if (/^[A-Z]$/.test(k)) { e.preventDefault(); typeGuess(k); }
  else if (e.key==='Backspace') { e.preventDefault(); deleteLast(); }
  else if (e.key==='Tab') { e.preventDefault(); advanceSelection(); }
});
</script>
